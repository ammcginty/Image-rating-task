<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Rating Task</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; color: white; font-family: Arial, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #ui-container { text-align: center; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none; }
        
        #stimulus-image { 
            width: 80%;
            max-width: 1200px;
            height: auto;
            max-height: 85vh;
            object-fit: contain; 
            border: 3px solid #444; 
        }

        input, button { padding: 15px; font-size: 1.2rem; margin: 10px; border-radius: 5px; cursor: pointer; }
        .rating-btn { width: 60px; height: 60px; margin: 8px; cursor: pointer; background: #333; color: white; border: 2px solid #555; font-size: 1.3rem; font-weight: bold; }
        .rating-btn:hover { background: #555; border-color: #00ff00; }
        
        #feedback-area { font-size: 1.2rem; margin-top: 20px; font-weight: bold; color: #00ff00; display: flex; flex-direction: column; align-items: center; min-height: 250px; }
        .distribution-container { margin-top: 15px; width: 350px; border-bottom: 2px solid white; display: flex; justify-content: space-around; align-items: flex-end; height: 120px; }
        .dist-column { width: 30px; display: flex; flex-direction: column-reverse; align-items: center; }
        .dot { width: 10px; height: 10px; background-color: #00ff00; border-radius: 50%; margin-bottom: 3px; }
        .axis-labels { width: 350px; display: flex; justify-content: space-around; font-size: 0.8rem; margin-top: 8px; color: white; }
        .feedback-label { font-size: 1.3rem; margin-bottom: 15px; color: #ccc; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="screen-welcome">
            <h1>Welcome to the Study</h1>
            <input type="text" id="participant-id" placeholder="Participant ID">
            <br>
            <button id="btn-start">Start Task</button>
            <p id="preload-status" style="color: #666; font-size: 0.9rem; margin-top: 10px;">Loading stimuli...</p>
        </div>

        <div id="screen-task" class="hidden">
            <img id="stimulus-image" class="hidden" src="">
            <div id="rating-container" class="hidden">
                <p style="font-size: 1.5rem;">Rate the image you just saw:</p>
                <div id="rating-buttons"></div>
                <p style="color: #888;">(1 = Unpleasant, 10 = Pleasant)</p>
            </div>
            <div id="feedback-area" class="hidden"></div>
        </div>

        <div id="screen-end" class="hidden">
            <h2>Task Complete</h2>
            <p id="status-message">Saving results...</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJiDGJdxDNQ0fKGeaEvswrg0jbroZrSjQax9RBQSzyApwBsEgE-ydfYjoHQKDIoXI/exec";
        
        const fileNames = [
            "Image_1.jpg", "Image_2.jpg", "Image_3.jpg", "Image_4.jpg", "Image_5.jpg",
            "Image_6.jpg", "Image_7.jpg", "Image_8.jpg", "Image_9.jpg", "Image_10.jpg",
            "Image_11.jpg", "Image_12.jpg", "Image_13.jpg", "Image_14.jpg", "Image_15.jpg",
            "Image_16.jpg", "Image_17.jpg", "Image_18.jpg", "Image_19.jpg", "Image_20.jpg"
        ];

        const imagePool = fileNames.map(name => "./" + name);

        // Preload Logic
        const preloadedImages = [];
        let imagesLoadedCount = 0;

        function preloadAllImages() {
            imagePool.forEach((url) => {
                const img = new Image();
                img.src = url;
                img.onload = () => {
                    imagesLoadedCount++;
                    if(imagesLoadedCount === imagePool.length) {
                        const status = document.getElementById('preload-status');
                        if(status) {
                            status.innerText = "Stimuli ready.";
                            status.style.color = "#00ff00";
                        }
                    }
                };
                preloadedImages.push(img);
            });
        }
        preloadAllImages();

        let currentCondition = 4;
        let participantId = "";
        let phase = 1; 
        let currentTrial = 0;
        let preRatings = new Array(20).fill(null);
        let postRatings = new Array(20).fill(null);
        let presentedAverages = new Array(20).fill(null);
        let trialQueue = [];

        const stimImg = document.getElementById('stimulus-image');
        const ratingContainer = document.getElementById('rating-container');
        const feedbackArea = document.getElementById('feedback-area');

        // Generate Buttons
        const btnBox = document.getElementById('rating-buttons');
        for (let i = 1; i <= 10; i++) {
            let btn = document.createElement('button');
            btn.innerText = i; btn.className = 'rating-btn';
            btn.onclick = () => handleRating(i);
            btnBox.appendChild(btn);
        }

        document.getElementById('btn-start').onclick = async function() {
            this.disabled = true;
            this.innerText = "Initializing...";
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                currentCondition = data.condition;
            } catch (e) { currentCondition = 4; }
            
            participantId = document.getElementById('participant-id').value.trim() || "ID_" + Math.random().toString(36).substr(2, 6).toUpperCase();
            trialQueue = imagePool.map((url, index) => ({ url, originalIndex: index }));
            
            document.getElementById('screen-welcome').classList.add('hidden');
            document.getElementById('screen-task').classList.remove('hidden');
            runTrial();
        };

        function runTrial() {
            ratingContainer.classList.add('hidden');
            feedbackArea.classList.add('hidden');
            feedbackArea.innerHTML = ""; 
            stimImg.src = trialQueue[currentTrial].url;
            stimImg.classList.remove('hidden');
            setTimeout(() => {
                stimImg.classList.add('hidden');
                ratingContainer.classList.remove('hidden');
            }, 2000);
        }

        function handleRating(score) {
            const originalIndex = trialQueue[currentTrial].originalIndex;
            ratingContainer.classList.add('hidden');
            if (phase === 1) {
                preRatings[originalIndex] = score; 
                showFeedback(score, originalIndex);
            } else {
                postRatings[originalIndex] = score; 
                nextTrial();
            }
        }

        function showFeedback(userRating, originalIndex) {
            feedbackArea.innerHTML = "";
            const leanHigh = (userRating <= 5);
            const peerRatings = [];
            for (let i = 0; i < 25; i++) {
                const bias = Math.random() > 0.2;
                let s = leanHigh ? 
                    (bias ? Math.floor(Math.random()*5)+6 : Math.floor(Math.random()*5)+1) : 
                    (bias ? Math.floor(Math.random()*5)+1 : Math.floor(Math.random()*5)+6);
                peerRatings.push(s);
            }
            const sum = peerRatings.reduce((a, b) => a + b, 0);
            const calculatedAvg = (sum / 25).toFixed(1);

            if (currentCondition === 4) {
                presentedAverages[originalIndex] = "N/A";
                setTimeout(nextTrial, 1000);
                return;
            }

            feedbackArea.classList.remove('hidden');
            if (currentCondition === 2 || currentCondition === 3) {
                presentedAverages[originalIndex] = calculatedAvg;
                feedbackArea.innerHTML += `<div class="feedback-label">Group average of ratings</div><div style="font-size:3rem">${calculatedAvg}</div>`;
            } else {
                presentedAverages[originalIndex] = "N/A";
            }

            if (currentCondition === 1 || currentCondition === 3) {
                feedbackArea.innerHTML += `<div class="feedback-label">Group distribution of ratings</div>`;
                renderDistribution(feedbackArea, peerRatings);
            }
            setTimeout(nextTrial, 2500);
        }

        function renderDistribution(container, peerRatings) {
            const distContainer = document.createElement('div');
            distContainer.className = 'distribution-container';
            const columns = Array.from({ length: 10 }, () => []);
            peerRatings.forEach(score => columns[score - 1].push(1));
            columns.forEach(colDots => {
                const colDiv = document.createElement('div');
                colDiv.className = 'dist-column';
                colDots.forEach(() => {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    colDiv.appendChild(dot);
                });
                distContainer.appendChild(colDiv);
            });
            container.appendChild(distContainer);
            container.innerHTML += `<div class="axis-labels"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>`;
        }

        function nextTrial() {
            feedbackArea.classList.add('hidden');
            currentTrial++;
            if (currentTrial < 20) {
                runTrial();
            } else if (phase === 1) {
                phase = 2; currentTrial = 0;
                trialQueue = trialQueue.sort(() => Math.random() - 0.5);
                alert("Phase 1 complete. Press OK to continue.");
                runTrial();
            } else {
                submitData();
            }
        }

        function submitData() {
            document.getElementById('screen-task').classList.add('hidden');
            document.getElementById('screen-end').classList.remove('hidden');
            fetch(SCRIPT_URL, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({
                    Participant_ID: participantId,
                    Condition: "Cond_" + currentCondition,
                    Image_Pre_Ratings: preRatings.join(","),
                    Image_Post_Ratings: postRatings.join(","),
                    Average_Presented: presentedAverages.join(",")
                })
            }).then(() => { document.getElementById('status-message').innerText = "Data saved. Thank you!"; });
        }
    </script>
</body>
</html>
