<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJiDGJdxDNQ0fKGeaEvswrg0jbroZrSjQax9RBQSzyApwBsEgE-ydfYjoHQKDIoXI/exec";
    
    // Updated to match your specific filenames
    const fileNames = [
        "Image_1.jpg", "Image_2.jpg", "Image_3.jpg", "Image_4.jpg", "Image_5.jpg",
        "Image_6.jpg", "Image_7.jpg", "Image_8.jpg", "Image_9.jpg", "Image_10.jpg",
        "Image_11.jpg", "Image_12.jpg", "Image_13.jpg", "Image_14.jpg", "Image_15.jpg",
        "Image_16.jpg", "Image_17.jpg", "Image_18.jpg", "Image_19.jpg", "Image_20.jpg"
    ];

    // Since they are in the root directory, we pull them directly by name
    const imagePool = fileNames.map(name => name);

    let currentCondition = 4;
    let participantId = "";
    let phase = 1; 
    let currentTrial = 0;
    
    let preRatings = new Array(20).fill(null);
    let postRatings = new Array(20).fill(null);
    let presentedAverages = new Array(20).fill(null);
    let trialQueue = [];

    // All UI references
    const stimImg = document.getElementById('stimulus-image');
    const ratingContainer = document.getElementById('rating-container');
    const feedbackArea = document.getElementById('feedback-area');

    // Generate Rating Buttons 1-10
    const btnBox = document.getElementById('rating-buttons');
    for (let i = 1; i <= 10; i++) {
        let btn = document.createElement('button');
        btn.innerText = i; btn.className = 'rating-btn';
        btn.onclick = () => handleRating(i);
        btnBox.appendChild(btn);
    }

    document.getElementById('btn-start').onclick = async function() {
        this.disabled = true;
        this.innerText = "Initializing...";
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            currentCondition = data.condition;
        } catch (e) { currentCondition = 4; }
        
        participantId = document.getElementById('participant-id').value.trim() || "ID_" + Math.random().toString(36).substr(2, 6).toUpperCase();
        
        // Setup Phase 1 (Sequential)
        trialQueue = imagePool.map((url, index) => ({ url, originalIndex: index }));
        
        document.getElementById('screen-welcome').classList.add('hidden');
        document.getElementById('screen-task').classList.remove('hidden');
        runTrial();
    };

    function runTrial() {
        ratingContainer.classList.add('hidden');
        feedbackArea.classList.add('hidden');
        feedbackArea.innerHTML = ""; 

        // Load the image
        stimImg.src = trialQueue[currentTrial].url;
        stimImg.classList.remove('hidden');
        
        // Show for 2 seconds then move to rating
        setTimeout(() => {
            stimImg.classList.add('hidden');
            ratingContainer.classList.remove('hidden');
        }, 2000);
    }

    function handleRating(score) {
        const originalIndex = trialQueue[currentTrial].originalIndex;
        ratingContainer.classList.add('hidden');
        
        if (phase === 1) {
            preRatings[originalIndex] = score; 
            showFeedback(score, originalIndex);
        } else {
            postRatings[originalIndex] = score; 
            nextTrial();
        }
    }

    function showFeedback(userRating, originalIndex) {
        feedbackArea.innerHTML = "";
        const leanHigh = (userRating <= 5);
        let avgScore = leanHigh ? (Math.floor(Math.random() * 5) + 6) : (Math.floor(Math.random() * 5) + 1);

        if (currentCondition === 4) {
            presentedAverages[originalIndex] = "N/A";
            setTimeout(nextTrial, 1000);
            return;
        }

        feedbackArea.classList.remove('hidden');

        if (currentCondition === 2 || currentCondition === 3) {
            presentedAverages[originalIndex] = avgScore;
            const avgLabel = document.createElement('div');
            avgLabel.className = 'feedback-label';
            avgLabel.innerText = "Group average of ratings";
            const avgValue = document.createElement('div');
            avgValue.style.fontSize = "3rem";
            avgValue.innerText = avgScore;
            feedbackArea.appendChild(avgLabel);
            feedbackArea.appendChild(avgValue);
        } else {
            presentedAverages[originalIndex] = "N/A";
        }

        if (currentCondition === 1 || currentCondition === 3) {
            const distLabel = document.createElement('div');
            distLabel.className = 'feedback-label';
            distLabel.innerText = "Group distribution of ratings";
            feedbackArea.appendChild(distLabel);
            renderDistribution(feedbackArea, leanHigh);
        }

        setTimeout(nextTrial, 2000);
    }

    function renderDistribution(container, leanHigh) {
        const distContainer = document.createElement('div');
        distContainer.className = 'distribution-container';
        const columns = Array.from({ length: 10 }, () => []);
        for (let i = 0; i < 25; i++) {
            let s;
            const bias = Math.random() > 0.2;
            if (leanHigh) s = bias ? (Math.floor(Math.random()*5)+6) : (Math.floor(Math.random()*5)+1);
            else s = bias ? (Math.floor(Math.random()*5)+1) : (Math.floor(Math.random()*5)+6);
            columns[s-1].push(1);
        }
        columns.forEach(colDots => {
            const colDiv = document.createElement('div');
            colDiv.className = 'dist-column';
            colDots.forEach(() => {
                const dot = document.createElement('div');
                dot.className = 'dot';
                colDiv.appendChild(dot);
            });
            distContainer.appendChild(colDiv);
        });
        container.appendChild(distContainer);
        const labels = document.createElement('div');
        labels.className = 'axis-labels';
        labels.innerHTML = '<span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>';
        container.appendChild(labels);
    }

    function nextTrial() {
        feedbackArea.classList.add('hidden');
        feedbackArea.innerHTML = "";
        currentTrial++;
        
        if (currentTrial < 20) {
            runTrial();
        } else if (phase === 1) {
            feedbackArea.classList.add('hidden');
            feedbackArea.innerHTML = "";
            phase = 2; 
            currentTrial = 0;
            // Shuffle for Phase 2
            trialQueue = trialQueue.sort(() => Math.random() - 0.5);
            alert("Phase 1 complete. Press OK to continue.");
            runTrial();
        } else {
            submitData();
        }
    }

    function submitData() {
        document.getElementById('screen-task').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                Participant_ID: participantId,
                Condition: "Cond_" + currentCondition,
                Image_Pre_Ratings: preRatings.join(","),
                Image_Post_Ratings: postRatings.join(","),
                Average_Presented: presentedAverages.join(",")
            })
        }).then(() => {
            document.getElementById('status-message').innerText = "Data saved. Thank you!";
        });
    }
</script>
